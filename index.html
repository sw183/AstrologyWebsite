<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrology Site</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    color:white;
    overflow-x:hidden;
    background-color:#050a18;
    background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 50px 80px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 130px 40px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 170px 120px, rgba(255,255,255,0.5), transparent),
        radial-gradient(2px 2px at 90px 60px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 200px 150px, rgba(255,255,255,0.7), transparent),
        radial-gradient(3px 3px at 300px 100px, rgba(255,255,255,0.95), transparent),
        radial-gradient(3px 3px at 400px 200px, rgba(255,255,255,0.9), transparent);
    background-size:350px 350px;
}

img{max-width:100%;height:auto;}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:rgba(11,26,53,0.9);
    flex-wrap:wrap;
}

.logo{font-size:1.4rem;font-weight:bold;}

.menu-toggle{display:none;font-size:1.8rem;cursor:pointer;}

.nav-links{
    list-style:none;
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

.hero{
    text-align:center;
    padding:100px 20px;
    max-width:900px;
    margin:auto;
}

.hero h1{font-size:3rem;margin-bottom:15px;}
.subtitle{color:#93c5fd;margin-bottom:25px;}
.hero-text{margin-bottom:15px;opacity:0.9;}

.horoscope-section{padding:80px 20px;text-align:center;}

.horoscope-form{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

input,select,button{
    padding:12px;
    border:none;
    border-radius:6px;
}

button{background:#2563eb;color:white;cursor:pointer;}

.categories-section{padding:80px 20px;text-align:center;}

.categories{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}

.card{
    background:#0b1a35;
    padding:30px;
    border-radius:14px;
}

.btn{display:inline-block;margin-top:15px;padding:10px;background:#2563eb;color:white;text-decoration:none;}

@media (max-width:768px){
    .menu-toggle{display:block;}
    .nav-links{display:none;flex-direction:column;width:100%;}
    .nav-links.active{display:flex;}
    .hero h1{font-size:2rem;}
}

@media (max-width:480px){
    .hero h1{font-size:1.6rem;}
    input,select,button{width:100%;}
}
</style>
</head>

<nav class="navbar">
    <div
