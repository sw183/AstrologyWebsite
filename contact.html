<!-- ================= CONTACT SECTION ================= -->
<section class="contact-section">
    <h1>Contact</h1>
    <h2>Have a message about the cosmos? Send us a message below.</h2>

    <form class="contact-form" id="contactForm">
        <input type="text" id="name" placeholder="Your Name" required minlength="2">
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" placeholder="Your Message" required minlength="10"></textarea>
        <button type="submit">Send Message</button>
    </form>

    <p id="formMessage"></p>
</section>

<!-- ================= FORM VALIDATION ================= -->
<script>
const form = document.getElementById("contactForm");
const msg = document.getElementById("formMessage");

form.addEventListener("submit", function(event) {
    event.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    // Reset message
    msg.textContent = "";

    // Validation checks
    if (!name || !email || !message) {
        msg.textContent = "Please fill out all fields.";
        msg.style.color = "red";
        return;
    }

    if (name.length < 2) {
        msg.textContent = "Name must be at least 2 characters.";
        msg.style.color = "red";
        return;
    }

    if (!email.includes("@") || !email.includes(".")) {
        msg.textContent = "Please enter a valid email address.";
        msg.style.color = "red";
        return;
    }

    if (message.length < 10) {
        msg.textContent = "Message must be at least 10 characters.";
        msg.style.color = "red";
        return;
    }

    msg.textContent = "Message sent successfully!";
    msg.style.color = "green";

    form.reset();
});
</script>
